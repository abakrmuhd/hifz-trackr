<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Debug</title>
    <style>
      body {
        font-family: sans-serif;
        background: #111;
        color: #f5f5f5;
        padding: 24px;
      }
      .card {
        max-width: 720px;
        padding: 16px;
        border: 1px solid #444;
        border-radius: 12px;
        background: #1b1b1b;
      }
      code {
        background: #222;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>JavaScript Debug</h1>
      <p id="status">HTML loaded. Waiting for script.</p>
    </div>
    <script>
      document.querySelector("#status").textContent = "Inline script ran.";
    </script>
    <script src="/src/boot-probe.js"></script>
  </body>
</html>
