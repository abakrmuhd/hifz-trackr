<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tap Hifz Beep Sound Picker</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #16161d;
      --panel: #20202a;
      --panel-2: #292937;
      --line: #3a3a4d;
      --text: #f4f7ed;
      --muted: #bbc3b8;
      --accent: #abda1a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(760px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.35rem, 5vw, 2rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    button {
      min-height: 92px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      text-align: left;
      cursor: pointer;
      font: inherit;
    }

    button:hover,
    button:focus-visible {
      border-color: color-mix(in srgb, var(--accent), white 10%);
      background: var(--panel-2);
      outline: none;
    }

    button.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent), transparent 72%);
    }

    strong {
      display: block;
      margin-bottom: 6px;
      font-size: .98rem;
    }

    span {
      display: block;
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.35;
    }

    .selection {
      margin-top: 16px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Choose the Tap Feedback Sound</h1>
      <p>Tap each option to hear it. Pick the one that feels least intrusive during recitation practice.</p>
    </header>

    <section class="grid" aria-label="Beep sound options">
      <button data-choice="soft-click" data-frequency="740" data-duration="0.045" data-wave="sine" data-gain="0.055">
        <strong>1. Soft click</strong>
        <span>Very short, clean, barely there.</span>
      </button>
      <button data-choice="warm-dot" data-frequency="520" data-duration="0.07" data-wave="sine" data-gain="0.06">
        <strong>2. Warm dot</strong>
        <span>Lower and calm, less digital.</span>
      </button>
      <button data-choice="bright-pip" data-frequency="920" data-duration="0.05" data-wave="triangle" data-gain="0.05">
        <strong>3. Bright pip</strong>
        <span>Clear confirmation without much body.</span>
      </button>
      <button data-choice="muted-tick" data-frequency="660" data-duration="0.035" data-wave="square" data-gain="0.025">
        <strong>4. Muted tick</strong>
        <span>A tiny mechanical tap, very quiet.</span>
      </button>
      <button data-choice="gentle-chime" data-frequency="830" data-duration="0.11" data-wave="sine" data-gain="0.045" data-second-frequency="1245">
        <strong>5. Gentle chime</strong>
        <span>Two-tone and pleasant, slightly more noticeable.</span>
      </button>
      <button data-choice="low-tock" data-frequency="390" data-duration="0.065" data-wave="triangle" data-gain="0.06">
        <strong>6. Low tock</strong>
        <span>Grounded and soft, avoids sharp highs.</span>
      </button>
      <button data-choice="quick-bell" data-frequency="1040" data-duration="0.08" data-wave="sine" data-gain="0.04">
        <strong>7. Quick bell</strong>
        <span>Light, high, and easy to notice.</span>
      </button>
      <button data-choice="wood-tap" data-frequency="470" data-duration="0.04" data-wave="square" data-gain="0.03">
        <strong>8. Wood tap</strong>
        <span>Dry tap character with a subdued edge.</span>
      </button>
      <button data-choice="soft-rise" data-frequency="610" data-duration="0.1" data-wave="sine" data-gain="0.045" data-slide="up">
        <strong>9. Soft rise</strong>
        <span>A short upward cue, more expressive.</span>
      </button>
      <button data-choice="soft-fall" data-frequency="780" data-duration="0.1" data-wave="sine" data-gain="0.045" data-slide="down">
        <strong>10. Soft fall</strong>
        <span>A short downward cue, gentle and final.</span>
      </button>
    </section>

    <div class="selection" id="selection">No sound selected yet.</div>
  </main>

  <script>
    let audioContext = null;
    const selection = document.querySelector("#selection");

    function getContext() {
      audioContext ||= new AudioContext();
      return audioContext;
    }

    function playTone(button) {
      const context = getContext();
      const now = context.currentTime;
      const duration = Number(button.dataset.duration);
      const gainLevel = Number(button.dataset.gain);
      const frequency = Number(button.dataset.frequency);
      const oscillator = context.createOscillator();
      const gain = context.createGain();

      oscillator.type = button.dataset.wave;
      oscillator.frequency.setValueAtTime(frequency, now);
      if (button.dataset.slide === "up") oscillator.frequency.exponentialRampToValueAtTime(frequency * 1.22, now + duration);
      if (button.dataset.slide === "down") oscillator.frequency.exponentialRampToValueAtTime(frequency * 0.74, now + duration);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(gainLevel, now + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      oscillator.connect(gain).connect(context.destination);
      oscillator.start(now);
      oscillator.stop(now + duration + 0.012);

      if (button.dataset.secondFrequency) {
        const second = context.createOscillator();
        const secondGain = context.createGain();
        second.type = "sine";
        second.frequency.setValueAtTime(Number(button.dataset.secondFrequency), now + 0.035);
        secondGain.gain.setValueAtTime(0.0001, now + 0.035);
        secondGain.gain.exponentialRampToValueAtTime(gainLevel * 0.72, now + 0.05);
        secondGain.gain.exponentialRampToValueAtTime(0.0001, now + duration + 0.045);
        second.connect(secondGain).connect(context.destination);
        second.start(now + 0.035);
        second.stop(now + duration + 0.055);
      }
    }

    document.querySelectorAll("button[data-choice]").forEach((button) => {
      button.addEventListener("click", async () => {
        if (audioContext?.state === "suspended") await audioContext.resume();
        document.querySelectorAll(".selected").forEach((item) => item.classList.remove("selected"));
        button.classList.add("selected");
        playTone(button);
        selection.textContent = `Selected: ${button.textContent.trim().replace(/\\s+/g, " ")}`;
      });
    });
  </script>
</body>
</html>
