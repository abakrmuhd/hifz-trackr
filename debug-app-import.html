<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Import Debug</title>
    <style>
      body {
        font-family: sans-serif;
        background: #111;
        color: #f5f5f5;
        padding: 24px;
      }
      .card {
        max-width: 900px;
        padding: 16px;
        border: 1px solid #444;
        border-radius: 12px;
        background: #1b1b1b;
        margin-bottom: 16px;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>App Import Debug</h1>
      <p id="status">Waiting for app import.</p>
      <pre id="error"></pre>
    </div>
    <div id="app"></div>
    <script type="module">
      const status = document.querySelector("#status");
      const error = document.querySelector("#error");

      const printError = (value) => {
        error.textContent = value?.stack || value?.message || String(value);
      };

      globalThis.addEventListener("error", (event) => {
        status.textContent = "Global error fired.";
        if (event.error) printError(event.error);
      });

      globalThis.addEventListener("unhandledrejection", (event) => {
        status.textContent = "Unhandled rejection fired.";
        printError(event.reason);
      });

      try {
        await import("/src/app.js");
        status.textContent = "App module imported.";
      } catch (importError) {
        status.textContent = "App module import failed.";
        printError(importError);
      }
    </script>
  </body>
</html>
